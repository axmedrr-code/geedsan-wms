# Mosquitto Configuration for GEEDSAN WMS

# Default listener
listener 1883
protocol mqtt

# WebSocket listener for browser-based clients
listener 8883
protocol websockets

# Allow anonymous connections (change in production)
allow_anonymous true

# Enable persistence
persistence true
persistence_location /mosquitto/data/

# Set password file location (create during deployment)
# password_file /mosquitto/config/passwd

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
