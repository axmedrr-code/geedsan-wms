services:

  postgres:
    image: postgres:16-alpine
    container_name: geedsan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: geedsan_wms
      POSTGRES_USER: geedsan
      POSTGRES_PASSWORD: GeedSan@Secure2024
    ports:
      - "5432:5432"
    networks:
      - geedsan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geedsan -d geedsan_wms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: geedsan-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: geedsan_wms
      DB_USER: geedsan
      DB_PASSWORD: GeedSan@Secure2024
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - geedsan-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: geedsan-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - geedsan-network

  odoo:
    image: odoo:16.0
    container_name: geedsan-odoo
    restart: unless-stopped
    environment:
      HOST: postgres
      PORT: 5432
      USER: geedsan
      PASSWORD: GeedSan@Secure2024
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: geedsan
      DB_PASSWORD: GeedSan@Secure2024
      DB_NAME: odoo
      ADMIN_PASSWORD: admin
    ports:
      - "8069:8069"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - geedsan-network

networks:
  geedsan-network:
    driver: bridge