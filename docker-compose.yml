services:
  postgres:
    image: postgres:16-alpine
    container_name: geedsan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: geedsan_wms
      POSTGRES_USER: geedsan
      POSTGRES_PASSWORD: GeedSan@Secure2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geedsan"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geedsan-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: geedsan-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: geedsan_wms
      DB_USER: geedsan
      DB_PASSWORD: GeedSan@Secure2024
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: geedsan-jwt-secret-change-this-in-production-2024
      JWT_REFRESH_SECRET: geedsan-refresh-secret-change-this-in-production-2024
      MQTT_BROKER: mqtt://mqtt:1883
      MQTT_CLIENT_ID: geedsan-backend
      CHIRPSTACK_URL: http://chirpstack:8080
      ODOO_API_BASE_URL: http://odoo:8069
      ODOO_API_KEY: your-odoo-api-key
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      odoo:
        condition: service_healthy
    networks:
      - geedsan-network
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: geedsan-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geedsan-network

  odoo:
    image: odoo:16.0
    container_name: geedsan-odoo
    restart: unless-stopped
    environment:
      HOST: postgres
      PORT: 5432
      USER: geedsan
      PASSWORD: GeedSan@Secure2024
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: geedsan
      DB_PASSWORD: GeedSan@Secure2024
      DB_NAME: odoo
      ADMIN_PASSWORD: admin
    ports:
      - "8069:8069"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - geedsan-network

  nginx:
    image: nginx:stable-alpine
    container_name: geedsan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - ./docker/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    networks:
      - geedsan-network

volumes:
  postgres_data:

networks:
  geedsan-network:
    driver: bridge
    
